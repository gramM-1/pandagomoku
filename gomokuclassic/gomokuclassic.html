<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gomoku vs CPU</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f1e6;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 20px;
}

#board-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

canvas {
  background: #e8d3a8; /* light birch color */
  cursor: pointer;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>Gomoku vs CPU</h1>
<p id="status">Your turn (Black)</p>
<button onclick="resetGame()">Restart</button>

<div id="board-wrapper">
  <canvas id="board" width="600" height="600"></canvas>
</div>

<script>
// ---------------------------
// Gomoku Game Script
// ---------------------------

const size = 15;
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

const spacing = canvas.width / (size + 1);
let board = [];
let gameOver = false;

function initBoard() {
  board = Array(size).fill().map(() => Array(size).fill(null));
  gameOver = false;
  statusText.textContent = "Your turn (Black)";
  drawBoard();
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw grid lines
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1;

  for (let i = 1; i <= size; i++) {
    ctx.beginPath();
    ctx.moveTo(spacing, i * spacing);
    ctx.lineTo(size * spacing, i * spacing);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(i * spacing, spacing);
    ctx.lineTo(i * spacing, size * spacing);
    ctx.stroke();
  }

  // Draw stones
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c]) drawStone(r, c, board[r][c]);
    }
  }
}

function drawStone(row, col, color) {
  const x = (col + 1) * spacing;
  const y = (row + 1) * spacing;

  ctx.beginPath();
  ctx.arc(x, y, spacing / 2.5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

canvas.addEventListener("click", function (e) {
  if (gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const col = Math.round(x / spacing) - 1;
  const row = Math.round(y / spacing) - 1;

  if (
    row < 0 || row >= size ||
    col < 0 || col >= size ||
    board[row][col]
  ) return;

  board[row][col] = "black";
  drawBoard();

  if (checkWin(row, col, "black")) {
    statusText.textContent = "You win!";
    gameOver = true;
    return;
  }

  statusText.textContent = "CPU thinking...";
  setTimeout(cpuMove, 1000);
});

function cpuMove() {
  if (gameOver) return;

  let bestMoves = [];
  let bestScore = -Infinity;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!board[r][c]) {
        // 1️⃣ Check instant win
        board[r][c] = "white";
        if (checkWin(r, c, "white")) {
          board[r][c] = "white";
          drawBoard();
          statusText.textContent = "CPU wins!";
          gameOver = true;
          return;
        }
        board[r][c] = null;

        // 2️⃣ Block player win
        board[r][c] = "black";
        if (checkWin(r, c, "black")) {
          board[r][c] = "white";
          drawBoard();
          statusText.textContent = "Your turn (Black)";
          return;
        }
        board[r][c] = null;

        // 3️⃣ Score position
        let score =
          evaluatePosition(r, c, "white") * 1.2 +
          evaluatePosition(r, c, "black");

        // Center preference
        const center = size / 2;
        score += 10 - (Math.abs(r - center) + Math.abs(c - center));

        if (score > bestScore) {
          bestScore = score;
          bestMoves = [{ r, c }];
        } else if (score === bestScore) {
          bestMoves.push({ r, c });
        }
      }
    }
  }

  const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
  board[move.r][move.c] = "white";
  drawBoard();

  if (checkWin(move.r, move.c, "white")) {
    statusText.textContent = "CPU wins!";
    gameOver = true;
    return;
  }

  statusText.textContent = "Your turn (Black)";
}

function evaluatePosition(row, col, color) {
  return (
    scoreDirection(row, col, 1, 0, color) +
    scoreDirection(row, col, 0, 1, color) +
    scoreDirection(row, col, 1, 1, color) +
    scoreDirection(row, col, 1, -1, color)
  );
}

function scoreDirection(row, col, dr, dc, color) {
  let count = 1;
  let openEnds = 0;

  let r = row + dr;
  let c = col + dc;
  while (
    r >= 0 && r < size &&
    c >= 0 && c < size &&
    board[r][c] === color
  ) {
    count++;
    r += dr;
    c += dc;
  }

  if (r >= 0 && r < size && c >= 0 && c < size && !board[r][c]) openEnds++;

  r = row - dr;
  c = col - dc;
  while (
    r >= 0 && r < size &&
    c >= 0 && c < size &&
    board[r][c] === color
  ) {
    count++;
    r -= dr;
    c -= dc;
  }

  if (r >= 0 && r < size && c >= 0 && c < size && !board[r][c]) openEnds++;

  if (count >= 5) return 100000;
  if (count === 4 && openEnds === 2) return 10000;
  if (count === 4 && openEnds === 1) return 5000;
  if (count === 3 && openEnds === 2) return 1000;
  if (count === 3 && openEnds === 1) return 200;
  if (count === 2 && openEnds === 2) return 100;

  return 10;
}

function checkWin(row, col, color) {
  return (
    countLine(row, col, 1, 0, color) >= 5 ||
    countLine(row, col, 0, 1, color) >= 5 ||
    countLine(row, col, 1, 1, color) >= 5 ||
    countLine(row, col, 1, -1, color) >= 5
  );
}

function countLine(row, col, dr, dc, color) {
  let count = 1;

  let r = row + dr;
  let c = col + dc;
  while (
    r >= 0 && r < size &&
    c >= 0 && c < size &&
    board[r][c] === color
  ) {
    count++;
    r += dr;
    c += dc;
  }

  r = row - dr;
  c = col - dc;
  while (
    r >= 0 && r < size &&
    c >= 0 && c < size &&
    board[r][c] === color
  ) {
    count++;
    r -= dr;
    c -= dc;
  }

  return count;
}

function resetGame() {
  initBoard();
}

initBoard();
</script>

</body>
</html>
